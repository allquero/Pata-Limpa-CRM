kind = "web"
previewPath = "/"
title = "Pata Limpa CRM"
version = "1.0.0"
id = "artifacts/grooming-crm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26270

[services.development]
run = "pnpm --filter @workspace/grooming-crm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grooming-crm", "run", "build" ]
publicDir = "artifacts/grooming-crm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26270"
BASE_PATH = "/"
