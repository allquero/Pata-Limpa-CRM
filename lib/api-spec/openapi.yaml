openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Grooming CRM API
servers:
  - url: /api
    description: Base API path
tags:
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: health
    description: Health operations
  - name: admin
    description: Admin panel for managing pet shop registrations and access
  - name: tenants
    description: Grooming business tenants
  - name: clients
    description: Pet owner clients
  - name: pets
    description: Client pets/dogs
  - name: services
    description: Grooming services
  - name: packages
    description: Service packages
  - name: appointments
    description: Appointments
  - name: financial
    description: Financial entries
  - name: templates
    description: WhatsApp message templates
  - name: leads
    description: Lead management
  - name: reports
    description: Reports and analytics
  - name: dashboard
    description: Dashboard summary

paths:
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'

  /auth/me/tenant:
    get:
      tags: [Auth]
      operationId: getMyTenant
      summary: Get the tenant associated with the authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Tenant for current user (null if not registered yet)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyTenantEnvelope'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    post:
      tags: [Auth]
      operationId: registerMyTenant
      summary: Register a tenant for the authenticated user (onboarding)
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TenantInput'
      responses:
        '201':
          description: Tenant registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tenant'
        '400':
          description: Invalid input or tenant already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/login:
    post:
      tags: [Auth]
      operationId: loginWithPassword
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /auth/logout:
    post:
      tags: [Auth]
      operationId: logoutSession
      summary: Clear the current session
      parameters:
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Session cleared.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '403':
          description: Cross-origin request rejected.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      summary: Delete a mobile session token
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Admin
  /admin/tenants:
    get:
      operationId: adminListTenants
      tags: [admin]
      summary: List all pet shop tenants (admin only)
      responses:
        "200":
          description: List of all tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Not admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    post:
      operationId: adminCreateTenant
      tags: [admin]
      summary: Register a new pet shop tenant (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminTenantInput"
      responses:
        "201":
          description: Created tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "403":
          description: Not admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/tenants/{id}:
    patch:
      operationId: adminUpdateTenant
      tags: [admin]
      summary: Update a pet shop tenant (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminTenantUpdate"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    delete:
      operationId: adminDeleteTenant
      tags: [admin]
      summary: Delete a pet shop tenant (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /admin/pending-users:
    get:
      operationId: adminListPendingUsers
      tags: [admin]
      summary: List users without a registered pet shop (admin only)
      responses:
        "200":
          description: List of users without tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"

  /admin/sales:
    get:
      operationId: adminListSales
      tags: [admin]
      summary: List admin sales with financial summary (admin only)
      responses:
        "200":
          description: Sales list with totals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSalesEnvelope"
    post:
      operationId: adminCreateSale
      tags: [admin]
      summary: Register a new sale and extend tenant access period (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSaleInput"
      responses:
        "201":
          description: Created sale
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSale"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /admin/sales/{id}:
    delete:
      operationId: adminDeleteSale
      tags: [admin]
      summary: Delete an admin sale entry (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Tenants
  /tenants:
    get:
      operationId: listTenants
      tags: [tenants]
      summary: List all grooming businesses
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"
    post:
      operationId: createTenant
      tags: [tenants]
      summary: Create a grooming business
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantInput"
      responses:
        "201":
          description: Created tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /tenants/{id}:
    get:
      operationId: getTenant
      tags: [tenants]
      summary: Get a tenant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    patch:
      operationId: updateTenant
      tags: [tenants]
      summary: Update a tenant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TenantUpdate"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
    delete:
      operationId: deleteTenant
      tags: [tenants]
      summary: Delete a tenant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Clients
  /clients:
    get:
      operationId: listClients
      tags: [clients]
      summary: List all clients
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Client"
    post:
      operationId: createClient
      tags: [clients]
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientInput"
      responses:
        "201":
          description: Created client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"

  /clients/{id}:
    get:
      operationId: getClient
      tags: [clients]
      summary: Get a client with their pets
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Client with pets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientWithPets"
    patch:
      operationId: updateClient
      tags: [clients]
      summary: Update a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdate"
      responses:
        "200":
          description: Updated client
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
    delete:
      operationId: deleteClient
      tags: [clients]
      summary: Delete a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Pets
  /pets:
    get:
      operationId: listPets
      tags: [pets]
      summary: List pets
      parameters:
        - name: clientId
          in: query
          schema:
            type: integer
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of pets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
    post:
      operationId: createPet
      tags: [pets]
      summary: Create a pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PetInput"
      responses:
        "201":
          description: Created pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"

  /pets/{id}:
    get:
      operationId: getPet
      tags: [pets]
      summary: Get a pet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    patch:
      operationId: updatePet
      tags: [pets]
      summary: Update a pet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PetUpdate"
      responses:
        "200":
          description: Updated pet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"
    delete:
      operationId: deletePet
      tags: [pets]
      summary: Delete a pet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Services
  /services:
    get:
      operationId: listServices
      tags: [services]
      summary: List services
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Service"
    post:
      operationId: createService
      tags: [services]
      summary: Create a service
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceInput"
      responses:
        "201":
          description: Created service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"

  /services/{id}:
    get:
      operationId: getService
      tags: [services]
      summary: Get a service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    patch:
      operationId: updateService
      tags: [services]
      summary: Update a service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServiceUpdate"
      responses:
        "200":
          description: Updated service
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Service"
    delete:
      operationId: deleteService
      tags: [services]
      summary: Delete a service
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Service Packages
  /packages:
    get:
      operationId: listPackages
      tags: [packages]
      summary: List service packages
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of packages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Package"
    post:
      operationId: createPackage
      tags: [packages]
      summary: Create a service package
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageInput"
      responses:
        "201":
          description: Created package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"

  /packages/{id}:
    get:
      operationId: getPackage
      tags: [packages]
      summary: Get a service package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"
    patch:
      operationId: updatePackage
      tags: [packages]
      summary: Update a service package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PackageUpdate"
      responses:
        "200":
          description: Updated package
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Package"
    delete:
      operationId: deletePackage
      tags: [packages]
      summary: Delete a service package
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /packages/{id}/sell:
    post:
      operationId: sellPackage
      tags: [packages]
      summary: Sell a package (generates appointments + financial entry)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SellPackageInput"
      responses:
        "201":
          description: Created appointments and financial entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SellPackageResult"

  # Appointments
  /appointments:
    get:
      operationId: listAppointments
      tags: [appointments]
      summary: List appointments
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            type: string
        - name: petId
          in: query
          schema:
            type: integer
        - name: clientId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppointmentFull"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create an appointment (supports recurring weeks)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentInput"
      responses:
        "201":
          description: Created appointment(s)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AppointmentFull"

  /appointments/{id}:
    get:
      operationId: getAppointment
      tags: [appointments]
      summary: Get an appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentFull"
    patch:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update an appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentUpdate"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentFull"
    delete:
      operationId: deleteAppointment
      tags: [appointments]
      summary: Delete an appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /appointments/{id}/status:
    patch:
      operationId: updateAppointmentStatus
      tags: [appointments]
      summary: Update appointment kanban status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppointmentStatusUpdate"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentFull"

  # Financial Entries
  /financial-entries:
    get:
      operationId: listFinancialEntries
      tags: [financial]
      summary: List financial entries
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of financial entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FinancialEntry"
    post:
      operationId: createFinancialEntry
      tags: [financial]
      summary: Create a financial entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinancialEntryInput"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialEntry"

  /financial-entries/summary:
    get:
      operationId: getFinancialSummary
      tags: [financial]
      summary: Get financial summary (totals by type and period)
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Financial summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialSummary"

  /financial-entries/{id}:
    get:
      operationId: getFinancialEntry
      tags: [financial]
      summary: Get a financial entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Financial entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialEntry"
    patch:
      operationId: updateFinancialEntry
      tags: [financial]
      summary: Update a financial entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FinancialEntryUpdate"
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialEntry"
    delete:
      operationId: deleteFinancialEntry
      tags: [financial]
      summary: Delete a financial entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Message Templates
  /message-templates:
    get:
      operationId: listMessageTemplates
      tags: [templates]
      summary: List message templates
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MessageTemplate"
    post:
      operationId: createMessageTemplate
      tags: [templates]
      summary: Create a message template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageTemplateInput"
      responses:
        "201":
          description: Created template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageTemplate"

  /message-templates/{id}:
    get:
      operationId: getMessageTemplate
      tags: [templates]
      summary: Get a message template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageTemplate"
    patch:
      operationId: updateMessageTemplate
      tags: [templates]
      summary: Update a message template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageTemplateUpdate"
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageTemplate"
    delete:
      operationId: deleteMessageTemplate
      tags: [templates]
      summary: Delete a message template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Leads
  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List clients with days since last appointment
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: minDaysSince
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Lead"

  # Reports
  /reports/revenue:
    get:
      operationId: getRevenueReport
      tags: [reports]
      summary: Revenue report by period
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: groupBy
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Revenue report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueReport"

  /reports/appointments:
    get:
      operationId: getAppointmentsReport
      tags: [reports]
      summary: Appointments report
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Appointments report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppointmentsReport"

  /reports/top-clients:
    get:
      operationId: getTopClientsReport
      tags: [reports]
      summary: Top clients by revenue and frequency
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Top clients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopClient"

  # Dashboard
  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Get dashboard summary stats
      parameters:
        - name: tenantId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      description: Opaque session token — `Bearer <sid>`.
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      description: Browser session cookie.
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # Admin
    AdminTenantInput:
      type: object
      required: [userId, name]
      properties:
        userId:
          type: string
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        accessStart:
          type: string
          format: date
        accessEnd:
          type: string
          format: date

    AdminTenantUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        accessStart:
          type: ["string", "null"]
          format: date
        accessEnd:
          type: ["string", "null"]
          format: date

    AdminUser:
      type: object
      required: [id, createdAt]
      properties:
        id:
          type: string
        email:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        lastName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    AdminSale:
      type: object
      required: [id, tenantId, description, amount, paidAt, periodStart, periodEnd, createdAt]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        description:
          type: string
        amount:
          type: string
        paidAt:
          type: string
          format: date
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
        createdAt:
          type: string
          format: date-time

    AdminSaleInput:
      type: object
      required: [tenantId, description, amount, paidAt, periodStart, periodEnd]
      properties:
        tenantId:
          type: integer
        description:
          type: string
        amount:
          type: number
        paidAt:
          type: string
          format: date
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date

    AdminSalesEnvelope:
      type: object
      required: [sales, monthTotal, yearTotal, allTimeTotal]
      properties:
        sales:
          type: array
          items:
            $ref: "#/components/schemas/AdminSale"
        monthTotal:
          type: number
        yearTotal:
          type: number
        allTimeTotal:
          type: number

    # Tenant
    Tenant:
      type: object
      required: [id, name, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: ["string", "null"]
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        accessStart:
          type: ["string", "null"]
          format: date
        accessEnd:
          type: ["string", "null"]
          format: date
        createdAt:
          type: string
          format: date-time

    TenantInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string

    TenantUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string

    # Client
    Client:
      type: object
      required: [id, tenantId, name, createdAt]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ClientWithPets:
      type: object
      required: [id, tenantId, name, createdAt, pets]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        name:
          type: string
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        pets:
          type: array
          items:
            $ref: "#/components/schemas/Pet"

    ClientInput:
      type: object
      required: [tenantId, name]
      properties:
        tenantId:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        notes:
          type: string

    ClientUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        address:
          type: string
        notes:
          type: string

    # Pet
    Pet:
      type: object
      required: [id, clientId, name, size, createdAt]
      properties:
        id:
          type: integer
        clientId:
          type: integer
        name:
          type: string
        breed:
          type: ["string", "null"]
        size:
          type: string
          enum:
            - mini_curto
            - mini_longo
            - pequeno_curto
            - pequeno_longo
            - medio_curto
            - medio_longo
            - grande_curto
            - grande_longo
            - gigante
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    PetInput:
      type: object
      required: [clientId, name, size]
      properties:
        clientId:
          type: integer
        name:
          type: string
        breed:
          type: string
        size:
          type: string
          enum:
            - mini_curto
            - mini_longo
            - pequeno_curto
            - pequeno_longo
            - medio_curto
            - medio_longo
            - grande_curto
            - grande_longo
            - gigante
        notes:
          type: string

    PetUpdate:
      type: object
      properties:
        name:
          type: string
        breed:
          type: string
        size:
          type: string
          enum:
            - mini_curto
            - mini_longo
            - pequeno_curto
            - pequeno_longo
            - medio_curto
            - medio_longo
            - grande_curto
            - grande_longo
            - gigante
        notes:
          type: string

    # Service
    Service:
      type: object
      required: [id, tenantId, name, size, price, createdAt]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        size:
          type: string
          enum:
            - mini_curto
            - mini_longo
            - pequeno_curto
            - pequeno_longo
            - medio_curto
            - medio_longo
            - grande_curto
            - grande_longo
            - gigante
        price:
          type: number
        durationMinutes:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    ServiceInput:
      type: object
      required: [tenantId, name, size, price]
      properties:
        tenantId:
          type: integer
        name:
          type: string
        description:
          type: string
        size:
          type: string
          enum:
            - mini_curto
            - mini_longo
            - pequeno_curto
            - pequeno_longo
            - medio_curto
            - medio_longo
            - grande_curto
            - grande_longo
            - gigante
        price:
          type: number
        durationMinutes:
          type: integer

    ServiceUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        size:
          type: string
          enum:
            - mini_curto
            - mini_longo
            - pequeno_curto
            - pequeno_longo
            - medio_curto
            - medio_longo
            - grande_curto
            - grande_longo
            - gigante
        price:
          type: number
        durationMinutes:
          type: integer

    # Package
    ServiceItem:
      type: object
      required: [serviceName, quantity]
      properties:
        serviceName:
          type: string
          maxLength: 100
        quantity:
          type: integer
          minimum: 1
          maximum: 52

    PriceBySize:
      type: object
      required: [size, price]
      properties:
        size:
          type: string
        price:
          type: number

    Package:
      type: object
      required: [id, tenantId, name, serviceItems, priceBySizes, createdAt]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        serviceItems:
          type: array
          items:
            $ref: "#/components/schemas/ServiceItem"
        priceBySizes:
          type: array
          items:
            $ref: "#/components/schemas/PriceBySize"
        createdAt:
          type: string
          format: date-time

    PackageInput:
      type: object
      required: [tenantId, name]
      properties:
        tenantId:
          type: integer
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        serviceItems:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/ServiceItem"
        priceBySizes:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/PriceBySize"

    PackageUpdate:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
          maxLength: 1000
        serviceItems:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/ServiceItem"
        priceBySizes:
          type: array
          maxItems: 20
          items:
            $ref: "#/components/schemas/PriceBySize"

    SellPackageInput:
      type: object
      required: [tenantId, clientId, petId, startDate, startTime]
      properties:
        tenantId:
          type: integer
        clientId:
          type: integer
        petId:
          type: integer
        startDate:
          type: string
          format: date
        startTime:
          type: string
          description: "HH:MM"
        notes:
          type: ["string", "null"]

    SellPackageResult:
      type: object
      required: [appointments, financialEntry]
      properties:
        appointments:
          type: array
          items:
            $ref: "#/components/schemas/AppointmentFull"
        financialEntry:
          $ref: "#/components/schemas/FinancialEntry"

    # Appointment
    AppointmentFull:
      type: object
      required: [id, tenantId, petId, clientId, scheduledDate, status, totalPrice, createdAt]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        petId:
          type: integer
        clientId:
          type: integer
        serviceId:
          type: ["integer", "null"]
        packageId:
          type: ["integer", "null"]
        scheduledDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [aguardando, em_atendimento, concluido, cancelado]
        totalPrice:
          type: number
        notes:
          type: ["string", "null"]
        recurringWeeks:
          type: ["integer", "null"]
        recurringGroupId:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        pet:
          $ref: "#/components/schemas/Pet"
        client:
          $ref: "#/components/schemas/Client"
        service:
          type: ["object", "null"]
          properties:
            id:
              type: integer
            name:
              type: string
            price:
              type: number
        package:
          type: ["object", "null"]
          properties:
            id:
              type: integer
            name:
              type: string
            price:
              type: number

    AppointmentInput:
      type: object
      required: [tenantId, petId, clientId, scheduledDate, totalPrice]
      properties:
        tenantId:
          type: integer
        petId:
          type: integer
        clientId:
          type: integer
        serviceId:
          type: integer
        packageId:
          type: integer
        scheduledDate:
          type: string
          format: date-time
        totalPrice:
          type: number
        notes:
          type: string
        recurringWeeks:
          type: integer
          minimum: 1
          maximum: 52

    AppointmentUpdate:
      type: object
      properties:
        petId:
          type: integer
        serviceId:
          type: integer
        packageId:
          type: integer
        scheduledDate:
          type: string
          format: date-time
        status:
          type: string
          enum: [aguardando, em_atendimento, concluido, cancelado]
        totalPrice:
          type: number
        notes:
          type: string

    AppointmentStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [aguardando, em_atendimento, concluido, cancelado]

    # Financial Entry
    FinancialEntry:
      type: object
      required: [id, tenantId, type, description, amount, date, createdAt]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        type:
          type: string
          enum: [receita, despesa, despesa_fixa]
        description:
          type: string
        amount:
          type: number
        date:
          type: string
          format: date
        category:
          type: ["string", "null"]
        appointmentId:
          type: ["integer", "null"]
        createdAt:
          type: string
          format: date-time

    FinancialEntryInput:
      type: object
      required: [tenantId, type, description, amount, date]
      properties:
        tenantId:
          type: integer
        type:
          type: string
          enum: [receita, despesa, despesa_fixa]
        description:
          type: string
        amount:
          type: number
        date:
          type: string
          format: date
        category:
          type: string
        appointmentId:
          type: integer

    FinancialEntryUpdate:
      type: object
      properties:
        type:
          type: string
          enum: [receita, despesa, despesa_fixa]
        description:
          type: string
        amount:
          type: number
        date:
          type: string
          format: date
        category:
          type: string

    FinancialSummary:
      type: object
      required: [totalReceitas, totalDespesas, totalDespesasFixas, saldo]
      properties:
        totalReceitas:
          type: number
        totalDespesas:
          type: number
        totalDespesasFixas:
          type: number
        saldo:
          type: number
        byMonth:
          type: array
          items:
            type: object
            required: [month, receitas, despesas, saldo]
            properties:
              month:
                type: string
              receitas:
                type: number
              despesas:
                type: number
              saldo:
                type: number

    # Message Template
    MessageTemplate:
      type: object
      required: [id, tenantId, name, type, content, createdAt]
      properties:
        id:
          type: integer
        tenantId:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [confirmacao, lembrete, leads, agradecimento]
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    MessageTemplateInput:
      type: object
      required: [tenantId, name, type, content]
      properties:
        tenantId:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [confirmacao, lembrete, leads, agradecimento]
        content:
          type: string

    MessageTemplateUpdate:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [confirmacao, lembrete, leads, agradecimento]
        content:
          type: string

    # Lead
    Lead:
      type: object
      required: [clientId, clientName, phone, daysSinceLastAppointment]
      properties:
        clientId:
          type: integer
        clientName:
          type: string
        phone:
          type: ["string", "null"]
        daysSinceLastAppointment:
          type: ["integer", "null"]
        lastAppointmentDate:
          type: ["string", "null"]
        totalAppointments:
          type: integer
        pets:
          type: array
          items:
            type: object
            required: [id, name, size]
            properties:
              id:
                type: integer
              name:
                type: string
              size:
                type: string

    # Reports
    RevenueReport:
      type: object
      required: [totalRevenue, totalAppointments, averageTicket, data]
      properties:
        totalRevenue:
          type: number
        totalAppointments:
          type: integer
        averageTicket:
          type: number
        data:
          type: array
          items:
            type: object
            required: [period, revenue, count]
            properties:
              period:
                type: string
              revenue:
                type: number
              count:
                type: integer

    AppointmentsReport:
      type: object
      required: [total, byStatus, bySize, data]
      properties:
        total:
          type: integer
        byStatus:
          type: array
          items:
            type: object
            required: [status, count]
            properties:
              status:
                type: string
              count:
                type: integer
        bySize:
          type: array
          items:
            type: object
            required: [size, count]
            properties:
              size:
                type: string
              count:
                type: integer
        data:
          type: array
          items:
            type: object
            required: [date, count]
            properties:
              date:
                type: string
              count:
                type: integer

    TopClient:
      type: object
      required: [clientId, clientName, totalRevenue, totalAppointments]
      properties:
        clientId:
          type: integer
        clientName:
          type: string
        totalRevenue:
          type: number
        totalAppointments:
          type: integer
        lastAppointmentDate:
          type: ["string", "null"]

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    # Auth
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']

    AuthUserEnvelope:
      type: object
      required: [user, isAdmin]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
        isAdmin:
          type: boolean

    MyTenantEnvelope:
      type: object
      required: [tenant]
      properties:
        tenant:
          oneOf:
            - $ref: '#/components/schemas/Tenant'
            - type: 'null'

    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1

    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string

    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # Dashboard
    DashboardSummary:
      type: object
      required: [todayAppointments, weekAppointments, monthRevenue, activeClients, pendingAppointments]
      properties:
        todayAppointments:
          type: integer
        weekAppointments:
          type: integer
        monthRevenue:
          type: number
        activeClients:
          type: integer
        pendingAppointments:
          type: integer
        recentAppointments:
          type: array
          items:
            $ref: "#/components/schemas/AppointmentFull"
